<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta title="Admin Dashboard">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* [Your existing CSS] */
  :root{--bg:#080c10;--surface:#0d1117;--border:#1e2a38;--accent:#00ff88;--danger:#ff4444;--text:#e2e8f0;--muted:#4a5568;--mono:'Space Mono',monospace;--sans:'Inter',sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);margin:0;}
  #loginScreen, #adminPanel{padding:2rem;}
  .login-box{max-width:380px;margin:10vh auto;}
  .field{margin-bottom:1.5rem;}
  label{display:block;font-family:var(--mono);font-size:0.75rem;color:var(--muted);margin-bottom:0.5rem;}
  input{width:100%;background:var(--surface);border:1px solid var(--border);padding:0.8rem;color:var(--text);font-family:var(--mono);}
  .btn{background:var(--accent);color:#000;border:none;padding:0.8rem 1.5rem;font-family:var(--mono);font-weight:700;cursor:pointer;width:100%;}
  .nav-tabs{display:flex;gap:1rem;margin-bottom:2rem;border-bottom:1px solid var(--border);padding-bottom:1rem;}
  .nav-tab{cursor:pointer;font-family:var(--mono);font-size:0.8rem;color:var(--muted);}
  .nav-tab.active{color:var(--accent);}
  .page{display:none;}
  .page.active{display:block;}
  .contact-card{background:var(--surface);padding:1rem;border:1px solid var(--border);margin-bottom:1rem;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1>Login</h1>
    <div class="field"><label>Username</label><input type="text" id="user"></div>
    <div class="field"><label>Password</label><input type="password" id="pass"></div>
    <button class="btn" onclick="handleLogin()">Authorize →</button>
  </div>
</div>

<div id="adminPanel" style="display:none;">
  <div class="nav-tabs">
    <span class="nav-tab active" onclick="showPage('messages',this)">messages</span>
    <span class="nav-tab" onclick="showPage('files',this)">file_server</span>
    <span class="nav-tab" onclick="showPage('settings',this)">settings</span>
    <span class="nav-tab" onclick="logout()">logout</span>
  </div>

  <div id="page-messages" class="page active">
    <div id="contactsList"></div>
  </div>

  <div id="page-files" class="page">
    <h2>Manage Dropbox</h2>
    <p style="color:var(--muted); font-size:0.9rem; margin-bottom:1rem;">
      Files are hosted on GitHub Releases to support large sizes (up to 2GB).
    </p>
    <a href="https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME/releases" target="_blank" class="btn" style="display:inline-block; text-align:center;">
      Open GitHub to Upload Files →
    </a>
  </div>

  <div id="page-settings" class="page">
    <h2>Change Password</h2>
    <div class="field"><label>New Password</label><input type="password" id="newpw"></div>
    <button class="btn" onclick="doChangePw()">Update Password</button>
  </div>
</div>

<script src="shared.js"></script>
<script>
  if(isLoggedIn()) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderContacts();
  }

  async function handleLogin() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    if(await checkLogin(u, p)) {
      setSession();
      location.reload();
    } else { alert('Access Denied'); }
  }

  function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    el.classList.add('active');
  }

  function renderContacts() {
    const list = document.getElementById('contactsList');
    const entries = getContacts();
    list.innerHTML = entries.map((e, i) => `
      <div class="contact-card">
        <strong>${e.name}</strong> (${e.email})<br>
        <small>${e.subject}</small><br><br>
        <p>${e.message}</p>
      </div>
    `).join('');
  }

  async function doChangePw() {
    const np = document.getElementById('newpw').value;
    if(np) {
      await changePassword(np);
      alert('Password updated!');
    }
  }
</script>
</body>
</html>
