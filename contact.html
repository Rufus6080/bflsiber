<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İletişim - BFLSiber</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000000;--surface:#0d1117;--border:#00ff00;--accent:#00ff88;--text:#00ff00;--muted:#4a5568;--mono:'Space Mono',monospace;--sans:'Inter',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border)}
.logo{font-family:var(--mono);font-size:1rem;color:var(--accent)}
.logo span{color:var(--muted)}
.back{font-family:var(--mono);font-size:0.8rem;color:var(--muted)}
.back:hover{color:var(--text)}
main{max-width:600px;margin:6rem auto;padding:0 2rem}
.page-tag{font-family:var(--mono);font-size:0.7rem;color:var(--accent);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:1rem}
h1{font-size:2.5rem;font-weight:300;letter-spacing:-0.03em;margin-bottom:0.75rem}
.sub{color:var(--muted);font-size:0.95rem;line-height:1.7;margin-bottom:3rem}
.field{margin-bottom:1.5rem}
label{display:block;font-family:var(--mono);font-size:0.75rem;color:var(--muted);letter-spacing:0.1em;margin-bottom:0.5rem}
input,textarea,select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:0.95rem;padding:0.75rem 1rem;border-radius:4px;outline:none;transition:border-color 0.2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:140px}
select option{background:var(--surface)}
.submit{width:100%;background:var(--accent);color:#000;font-family:var(--mono);font-size:0.9rem;font-weight:700;padding:0.875rem;border:none;border-radius:4px;cursor:pointer;transition:opacity 0.2s}
.submit:hover{opacity:0.85}
.success{display:none;background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.3);border-radius:4px;padding:1.5rem;text-align:center;font-family:var(--mono);font-size:0.9rem;color:var(--accent)}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">BFL</span>Siber</a>
  <a href="index.html" class="back">← Geri</a>
</nav>
<main>
  <div class="page-tag">İletişim</div>
  <h1>Bize Ulaşın</h1>
  <p class="sub">Her türlü geri bildirime açığız</p>

  <div id="success" class="success">
    Mesaj başarıyla alındı. <br><span style="color:var(--muted);font-size:0.8rem">Sayfadan ayrılabilirsiniz.</span>
  </div>

  <form id="contactForm">
    <div class="field">
      <label>isim</label>
      <input type="text" id="fname" placeholder="İsim" required>
    </div>
    <div class="field">
      <label>email</label>
      <input type="email" id="femail" placeholder="isim@example.com" required>
    </div>
    <div class="field">
      <label>Konu:</label>
      <select id="fsubject">
        <option value="collaboration">İşbirliği</option>
        <option value="vuln_report">Bug Report / Güvenlik Açığı Bildirme</option>
        <option value="ctf">CTF ve yarışmalar ile ilgili</option>
        <option value="other">Konu dışı / Diğer</option>
      </select>
    </div>
    <div class="field">
      <label>Mesaj</label>
      <textarea id="fmessage" placeholder="write your message here..." required></textarea>
    </div>
    <button type="submit" class="submit">Gönder →</button>
  </form>
</main>
<script src="shared.js"></script>
<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const entry = {
    name: document.getElementById('fname').value,
    email: document.getElementById('femail').value,
    subject: document.getElementById('fsubject').value,
    message: document.getElementById('fmessage').value
  };
  saveContact(entry);
  document.getElementById('contactForm').style.display = 'none';
  document.getElementById('success').style.display = 'block';
});
</script>
</body>
</html>
