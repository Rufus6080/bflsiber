<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFLSiber</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* [Your existing CSS remains exactly the same] */
  :root{--bg:#080c10;--surface:#0d1117;--border:#1e2a38;--accent:#00ff88;--text:#e2e8f0;--muted:#4a5568;--mono:'Space Mono',monospace;--sans:'Inter',sans-serif;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);margin:0;padding:0;}
  nav{display:flex;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border);background:rgba(8,12,16,0.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--mono);font-weight:700;color:var(--accent);}
  .nav-links a{margin-left:1.5rem;font-family:var(--mono);font-size:0.85rem;color:var(--muted);transition:0.2s;}
  .nav-links a:hover{color:var(--accent);}
  section{max-width:900px;margin:4rem auto;padding:0 2rem;}
  .section-tag{font-family:var(--mono);font-size:0.7rem;color:var(--accent);margin-bottom:0.5rem;text-transform:uppercase;}
  h2{font-family:var(--mono);font-size:1.5rem;margin-bottom:2rem;}
  .posts{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);}
  .post{background:var(--surface);padding:1.5rem;display:flex;justify-content:space-between;align-items:center;transition:0.2s;}
  .post:hover{background:#161b22;}
  .post-tag{font-family:var(--mono);font-size:0.65rem;padding:0.2rem 0.5rem;background:rgba(0,255,136,0.1);color:var(--accent);margin-right:1rem;border:1px solid rgba(0,255,136,0.2);}
  .post-title{font-weight:500;font-size:1rem;}
  .post-meta{font-family:var(--mono);font-size:0.75rem;color:var(--muted);}
</style>
</head>
<body>
<nav>
  <div class="logo">BFLSİBER<span>.sh</span></div>
  <div class="nav-links">
    <a href="#dropbox">dropbox</a>
    <a href="contact.html">contact</a>
    <a href="admin.html">admin</a>
  </div>
</nav>

<section id="writeups">
  <div class="section-tag">writeups!!</div>
  <h2>[writeups ve blog]</h2>
  <div class="posts">
    <a href="#" class="post">
      <div><span class="post-tag">CTF</span><span class="post-title">Siber Güvenliğe Giriş</span></div>
      <div class="post-meta">11-05-2024</div>
    </a>
  </div>
</section>

<section id="dropbox">
  <div class="section-tag">public_repo!!</div>
  <h2>[dosya deposu / dropbox]</h2>
  <div id="fileList" class="posts">
    <div class="post">Sistem taranıyor...</div>
  </div>
</section>

<script src="shared.js"></script>
<script>
  async function renderFiles() {
    const files = await getDropboxFiles();
    const container = document.getElementById('fileList');
    if (files.length === 0) {
      container.innerHTML = '<div class="post">Dosya bulunamadı.</div>';
      return;
    }
    container.innerHTML = files.map(f => `
      <a href="${f.url}" class="post" target="_blank">
        <div><span class="post-tag">DOWNLOAD</span><span class="post-title">${f.name}</span></div>
        <div class="post-meta">${f.size} | ${f.date}</div>
      </a>
    `).join('');
  }
  document.addEventListener('DOMContentLoaded', renderFiles);
</script>
</body>
</html>
